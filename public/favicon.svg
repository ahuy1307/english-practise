<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark forest background -->
  <rect width="32" height="32" rx="7" fill="#0e1a12"/>

  <!-- Back card (most tilted) -->
  <rect
    x="8" y="8" width="17" height="13" rx="2.5"
    fill="#162019" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.25"
    transform="rotate(-11 16.5 14.5)"
  />

  <!-- Middle card -->
  <rect
    x="8" y="8" width="17" height="13" rx="2.5"
    fill="#1a2820" stroke="#c9a96e" stroke-width="0.6" stroke-opacity="0.5"
    transform="rotate(-4.5 16.5 14.5)"
  />

  <!-- Front card -->
  <rect x="7.5" y="8" width="17" height="13" rx="2.5" fill="#1e2d22" stroke="#c9a96e" stroke-width="0.9"/>

  <!-- Phrase line (bold) -->
  <rect x="11" y="11.5" width="10" height="1.6" rx="0.8" fill="#c9a96e"/>
  <!-- Pronunciation line (dimmer, narrower) -->
  <rect x="11" y="14.2" width="7" height="1.1" rx="0.55" fill="#c9a96e" opacity="0.45"/>
  <!-- Example line (faintest) -->
  <rect x="11" y="16.7" width="9" height="1" rx="0.5" fill="#c9a96e" opacity="0.25"/>

  <!-- SRS progress dots -->
  <circle cx="13.5" cy="25.5" r="1.3" fill="#c9a96e" opacity="0.9"/>
  <circle cx="16.5" cy="25.5" r="1.3" fill="#c9a96e" opacity="0.35"/>
  <circle cx="19.5" cy="25.5" r="1.3" fill="#c9a96e" opacity="0.15"/>
</svg>
